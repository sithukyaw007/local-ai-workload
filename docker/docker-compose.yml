services:
  llm-gateway:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: local-llm-gateway
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    entrypoint: ["litellm"]
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      - USE_CHAT_COMPLETIONS_URL_FOR_ANTHROPIC_MESSAGES=True
    volumes:
      - ../config/router.yaml:/app/config.yaml:ro
      - ../config/mlx_patch.py:/app/mlx_patch.py:ro
      - ../config/sitecustomize.py:/usr/lib/python3.13/site-packages/sitecustomize.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      retries: 8

networks:
  default:
    name: local-ai-workload
