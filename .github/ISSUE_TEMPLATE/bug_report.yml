name: Bug report
description: Report a reproducible problem in local-ai-workload
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide enough detail to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: A clear and concise description.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your machine and runtime details.
      placeholder: |
        - macOS version:
        - Chip (M-series):
        - Docker Desktop version:
        - ollama version:
        - llama.cpp version:
        - claude version:
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands and sequence.
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste key output from logs or terminal.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other details that may help.
