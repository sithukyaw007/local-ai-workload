model_list:
  - model_name: local-coder-fast
    litellm_params:
      model: openai/qwen2.5-coder:7b-instruct-q4_K_M
      api_base: http://host.docker.internal:11434/v1
      api_key: ollama

  - model_name: local-coder-quality
    litellm_params:
      model: openai/local-coder-quality
      api_base: http://host.docker.internal:8080/v1
      api_key: llama

  - model_name: local-general
    litellm_params:
      model: openai/qwen2.5:14b-instruct-q4_K_M
      api_base: http://host.docker.internal:11434/v1
      api_key: ollama

  - model_name: cloud-fallback
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/CLOUD_API_KEY
      api_base: os.environ/CLOUD_API_BASE

router_settings:
  routing_strategy: usage-based-routing
  allowed_fails: 2
  cooldown_time: 15
  enable_pre_call_checks: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  health_check_interval: 60
  infer_model_from_keys: false
