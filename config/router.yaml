model_list:
  - model_name: local-coder-fast
    litellm_params:
      model: hosted_vllm/mlx-community/Qwen3.5-35B-A3B-4bit
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: local-coder-quality
    litellm_params:
      model: hosted_vllm/mlx-community/Qwen3.5-35B-A3B-4bit
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: local-general
    litellm_params:
      model: hosted_vllm/mlx-community/Qwen3.5-35B-A3B-4bit
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: cloud-fallback
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/CLOUD_API_KEY
      api_base: os.environ/CLOUD_API_BASE

router_settings:
  routing_strategy: usage-based-routing
  allowed_fails: 5
  cooldown_time: 10
  enable_pre_call_checks: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  health_check_interval: 60
  infer_model_from_keys: false

litellm_settings:
  default_internal_model: local-coder-quality
  drop_params: true
  callbacks: ["mlx_patch._proxy_patch"]
