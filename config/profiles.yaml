profiles:
  coding_assistant:
    model: local-coder-fast
    temperature: 0.2
    max_tokens: 1800
    context_window: 8192
    notes: Fast interactive coding loop.

  code_review_refactor:
    model: local-coder-quality
    temperature: 0.1
    max_tokens: 2600
    context_window: 12288
    notes: Deep review and refactor planning.

  design_ideation:
    model: local-general
    temperature: 0.7
    max_tokens: 2200
    context_window: 12288
    notes: Product and UX ideation with alternatives.

  writing_planning:
    model: local-general
    temperature: 0.5
    max_tokens: 2000
    context_window: 8192
    notes: Specs, plans, and concise communication.

  local_rag:
    model: local-coder-quality
    temperature: 0.2
    max_tokens: 2200
    context_window: 16384
    notes: Retrieval-grounded answers over local project data.

fallback_policy:
  enabled_env_flag: ENABLE_CLOUD_FALLBACK
  order:
    - local-coder-quality
    - local-coder-fast
    - cloud-fallback
